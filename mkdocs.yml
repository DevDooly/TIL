site_name: My TIL Wiki
site_url: https://devdooly.github.io/TIL/
repo_url: https://github.com/devdooly/til
edit_uri: edit/main/docs/

# 📌 404 방지 핵심 설정 (URL 뒤에 .html 붙임)
use_directory_urls: false

theme:
  name: material
  language: ko
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 라이트 모드로 전환
  features:
    # - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - awesome-pages

extra_javascript:
  - https://unpkg.com/mermaid/dist/mermaid.min.js
  - javascripts/mermaid-init.js


# 📌 네비게이션 경로 (모두 docs 폴더 내부 기준이어야 함)
